<!DOCTYPE html>
<html lang="fr">
<head><style>
    body { background: #1a0b2e; color: #ff4d94; font-family: 'Courier New', monospace; padding: 20px; }
    button { background: #ff4d94; color: white; border: none; padding: 15px; margin: 5px; cursor: pointer; font-weight: bold; }
    button:disabled { background: #555; }
    table { border-collapse: collapse; }
    td:nth-child(2), td:nth-child(3) { color: #00ff00; font-weight: bold; font-size: 1.1rem; text-align: center; }
    th { background: #ff4d94; color: white; padding: 10px; }
    tr:nth-child(even) { background: #2a1a4e; }
    tr:hover { background: #3a2a6e; }
    td { padding: 10px; border-right: 1px solid #ff4d94; }
</style></head>
<body>
    <h1>ADMIN ZEKATON</h1>
    <div id="setup"><input id="nums" placeholder="20,30,40"><button onclick="setNums()">Enregistrer</button></div>
    <div id="game" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="status">En attente</h2>
            <div>
                <button id="btnFinish" onclick="if(confirm('Terminer le jeu ?')) socket.emit('admin:finishGame')" style="background: #ff6b6b; padding: 10px 20px; margin-left: 10px;">Terminer le jeu</button>
                <button id="btnReset" onclick="if(confirm('Réinitialiser tout le jeu ?')) socket.emit('admin:resetGame')" style="background: #ff6b6b; padding: 10px 20px; margin-left: 10px;">Réinitialiser Jeu</button>
            </div>
        </div>
        <div id="timer" style="font-size: 2rem; color: #ff4d94;"></div>
        <div style="margin: 15px 0;">
            <div style="margin-bottom: 10px;">
                <button id="btnStartCard" onclick="socket.emit('admin:startCard')">Lancer Nouvelle Carte</button>
            </div>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button onclick="socket.emit('admin:prevCard')" style="background: #4d94ff; flex: 1;">◀ Carte Précédente</button>
                <button onclick="socket.emit('admin:nextCard')" style="background: #4d94ff; flex: 1;">Carte Suivante ▶</button>
            </div>
        </div>
        <div style="margin: 15px 0;">
            <div style="margin-bottom: 10px;">
                <button id="btnStartQ" onclick="socket.emit('admin:startQuestion')">Lancer Question</button>
            </div>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button onclick="socket.emit('admin:prevQuestion')" style="background: #4d94ff; flex: 1;">◀ Question Précédente</button>
                <button onclick="socket.emit('admin:nextQuestion')" style="background: #4d94ff; flex: 1;">Question Suivante ▶</button>
            </div>
        </div>
        <button id="btnStopQ" onclick="socket.emit('admin:stopQuestion')">Arrêter Question</button>
        <table border="1" style="width:100%; color:white; margin-top:20px; border-collapse: collapse;">
            <thead><tr style="background: #ff4d94;"><th style="width: 30%; padding: 10px;">Joueur</th><th style="width: 15%; padding: 10px;">Score Carte</th><th style="width: 15%; padding: 10px;">Score Total</th><th style="padding: 10px;">Trouvé</th><th style="width: 10%; padding: 10px;">Action</th></tr></thead><tbody id="playerTable"></tbody>
        </table>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        function setNums() { socket.emit('admin:setNumbers', document.getElementById('nums').value.split(',').map(Number)); document.getElementById('setup').style.display='none'; document.getElementById('game').style.display='block'; }
        socket.on('update', (data) => {
            document.getElementById('status').innerText = `Carte: ${data.currentCardIndex + 1} | Question: ${data.currentQuestionIndex + 1} | État: ${data.gameState}`;
            document.getElementById('timer').innerText = data.timeLeft;
            
            // Désactiver le bouton si la limite est atteinte ou si l'état n'est pas correct
            document.getElementById('btnStartQ').disabled = !((data.gameState === 'WAITING_FOR_QUESTION' || data.gameState === 'FEEDBACK') && data.currentQuestionIndex < 4);
            
            let html = '';
            for(let id in data.players) {
                const p = data.players[id];
                const nameColor = p.left ? '#ff6b6b' : '#ff4d94';
                const nameStyle = p.left ? 'text-decoration: line-through;' : '';
                html += `<tr style="border-bottom: 1px solid #ff4d94;"><td style="padding: 10px; color: ${nameColor}; ${nameStyle}">${p.name}</td><td style="padding: 10px; text-align: center; color: #00ff00; font-weight: bold; font-size: 1.1rem;">${p.cardScore}</td><td style="padding: 10px; text-align: center; color: #00ff00; font-weight: bold; font-size: 1.1rem;">${p.totalScore}</td><td style="padding: 10px; text-align: center;">${p.found ? '✅' : '❌'}</td><td style="padding: 10px;"><button onclick="socket.emit('admin:deletePlayer', '${id}')">Supprimer</button></td></tr>`;
            }
            document.getElementById('playerTable').innerHTML = html;
        });
        socket.on('timer', (t) => { document.getElementById('timer').innerText = t; });
    </script>
</body>
</html>
