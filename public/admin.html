<!DOCTYPE html>
<html lang="fr">
<head><style>
    body { background: #1a0b2e; color: #ff4d94; font-family: 'Courier New', monospace; padding: 10px; }
    button { background: #ff4d94; color: white; border: none; padding: 15px; margin: 5px; cursor: pointer; font-weight: bold; }
    button:disabled { background: #555; }
    table { border-collapse: collapse; }
    td:nth-child(2), td:nth-child(3) { color: #00ff00; font-weight: bold; font-size: 1.1rem; text-align: center; }
    th { background: #ff4d94; color: white; padding: 5px; }
    tr:nth-child(even) { background: #2a1a4e; }
    tr:hover { background: #3a2a6e; }
    td { padding: 5px; border-right: 1px solid #ff4d94; }
</style></head>
<body>
    <div id="playerLink" style="background:#1a0b2e;border:2px solid #ff4d94;border-radius:8px;padding:6px 8px;display:inline-flex;align-items:center;gap:8px;position:fixed;top:10px;right:10px;z-index:1000;max-width:340px;">
        <span style="color:#aaa;font-size:0.85rem;">🔗 Lien joueurs :</span>
        <span id="linkText" style="color:#00ff00;font-weight:bold;font-size:0.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px;"></span>
        <button id="copyBtn" onclick="copyLink()" style="padding:5px 12px;font-size:0.8rem;background:#4d94ff;margin:0;">📋 Copier</button>
    </div>
    <div id="setup"><input id="nums" placeholder="20,30,40"><button onclick="setNums()">Enregistrer</button></div>
    <div id="game" style="display:none;">
        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 10px;">
            <button id="btnFinish" onclick="if(confirm('Terminer le jeu ?')) socket.emit('admin:finishGame')" style="background: #ff6b6b; padding: 10px 20px;">Terminer le jeu</button>
            <button id="btnReset" onclick="if(confirm('Réinitialiser tout le jeu ?')) socket.emit('admin:resetGame')" style="background: #ff6b6b; padding: 10px 20px;">Réinitialiser Jeu</button>
        </div>
        <div style="margin: 8px 0;">
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 8px;">
                <button id="btnStartCard" onclick="socket.emit('admin:startCard')" style="flex: 2;">Lancer Nouvelle Carte</button>
                <button onclick="socket.emit('admin:prevCard')" style="background: #4d94ff; flex: 1;">◀ Préc.</button>
                <button onclick="socket.emit('admin:nextCard')" style="background: #4d94ff; flex: 1;">Suiv. ▶</button>
            </div>
        </div>
        <div style="margin: 8px 0;">
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 8px;">
                <button id="btnStartQ" onclick="socket.emit('admin:startQuestion')" style="flex: 2;">Lancer Question</button>
                <button onclick="socket.emit('admin:prevQuestion')" style="background: #4d94ff; flex: 1;">◀ Préc.</button>
                <button id="btnNextQuestion" onclick="socket.emit('admin:nextQuestion')" style="background: #4d94ff; flex: 1;">Suiv. ▶</button>
            </div>
        </div>
        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
            <button id="btnStopQ" onclick="socket.emit('admin:stopQuestion')" style="flex: 1;">Arrêter Question</button>
            <div id="timer" style="font-size: 1.5rem; color: #ff4d94; font-weight: bold; flex: 1; text-align: center;"></div>
            <div id="answersCount" style="font-size: 1.5rem; color: #00ff00; font-weight: bold; flex: 1; text-align: center; border: 1px solid #00ff00; padding: 5px; border-radius: 5px;">0/0</div>
        </div>
        <h2 id="status" style="font-size: 1.2rem; margin-bottom: 10px; color: #ff4d94;">En attente</h2>
        <div id="finalResults" style="display:none; margin: 10px 0; border: 1px solid #ff4d94; border-radius: 8px; padding: 10px; background: #120724;"></div>
        <table border="1" style="width:100%; color:white; margin-top:10px; border-collapse: collapse;">
            <thead><tr style="background: #ff4d94;"><th style="width: 36%; padding: 5px;">Joueur</th><th style="width: 15%; padding: 5px;">Score Carte</th><th style="width: 15%; padding: 5px;">Score Total</th><th style="width: 7%; padding: 5px;">Trouvé</th><th style="width: 10%; padding: 5px;">Action</th></tr></thead><tbody id="playerTable"></tbody>
        </table>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const playerUrl = window.location.origin;
        document.getElementById('linkText').innerText = playerUrl;
        function copyLink() {
            navigator.clipboard.writeText(playerUrl).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.innerText = '✅ Copié !';
                setTimeout(() => btn.innerText = '📋 Copier', 2000);
            });
        }
        function setNums() { socket.emit('admin:setNumbers', document.getElementById('nums').value.split(',').map(Number)); document.getElementById('setup').style.display='none'; document.getElementById('game').style.display='block'; }
        socket.on('update', (data) => {
            document.getElementById('status').innerText = `Carte: ${data.currentCardIndex + 1} | Question: ${data.currentQuestionIndex + 1} | État: ${data.gameState}`;
            document.getElementById('timer').innerText = data.timeLeft;
            const finalResults = document.getElementById('finalResults');
            const playersTable = document.getElementById('playerTable').closest('table');
            
            // Désactiver le bouton si la limite est atteinte ou si l'état n'est pas correct
            document.getElementById('btnStartQ').disabled = !((data.gameState === 'WAITING_FOR_QUESTION' || data.gameState === 'FEEDBACK') && data.currentQuestionIndex < 4);
            
            // Changer le label du bouton "Avancer Question" si on est à la Q4
            const btnNextQuestion = document.getElementById('btnNextQuestion');
            if(data.currentQuestionIndex === 3) {
                btnNextQuestion.innerText = '🔄 Carte';
            } else {
                btnNextQuestion.innerText = 'Suiv. ▶';
            }
            
            const registeredPlayers = Object.keys(data.players).length;
            document.getElementById('answersCount').innerText = `Joueurs: ${registeredPlayers}`;

            if (data.gameState === 'GAME_FINISHED') {
                const ranking = Object.values(data.players).sort((a, b) => b.totalScore - a.totalScore);
                const top3 = ranking.slice(0, 3);
                const medals = ['🥇', '🥈', '🥉'];

                const podiumHtml = top3.length
                    ? top3.map((p, i) => `<div style="flex:1;min-width:140px;border:1px solid #ff4d94;border-radius:8px;padding:8px;text-align:center;background:#1b0d35;"><div style="font-size:1.6rem;">${medals[i]}</div><div style="color:#fff;font-weight:bold;">${p.name}</div><div style="color:#00ff00;font-size:1.2rem;">${p.totalScore} pts</div></div>`).join('')
                    : '<p style="color:#fff;">Aucun joueur classé.</p>';

                const rankingHtml = ranking.length
                    ? ranking.map((p, i) => `<div style="display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid #3a2a6e;"><span style="color:#fff;">#${i + 1} ${p.name}</span><span style="color:#00ff00;font-weight:bold;">${p.totalScore} pts</span></div>`).join('')
                    : '<p style="color:#fff;">Aucun score.</p>';

                finalResults.innerHTML = `
                    <h3 style="margin:0 0 10px 0; color:#ff4d94;">🏁 Fin de partie</h3>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">${podiumHtml}</div>
                    <h4 style="margin:0 0 6px 0; color:#ff4d94;">Classement complet</h4>
                    <div>${rankingHtml}</div>
                `;
                finalResults.style.display = 'block';
                playersTable.style.display = 'none';
                return;
            }

            finalResults.style.display = 'none';
            playersTable.style.display = 'table';

            let html = '';
            for(let id in data.players) {
                const p = data.players[id];
                const nameColor = p.left ? '#ff6b6b' : '#ff4d94';
                const nameStyle = p.left ? 'text-decoration: line-through;' : '';
                // En FEEDBACK, currentQuestionIndex a déjà été incrémenté côté serveur, on compare donc sans +1
                const checkQ = (data.gameState === 'FEEDBACK') ? data.currentQuestionIndex : data.currentQuestionIndex + 1;
                const hasAnswered = Array.isArray(p.history) && p.history.some(h => h.question === checkQ);
                const isActive = data.gameState === 'GUESSING' || data.gameState === 'FEEDBACK';
                const indicatorColor = !isActive ? '#888888' : (hasAnswered ? '#00ff00' : '#ff2222');
                html += `<tr style="border-bottom: 1px solid #ff4d94;"><td style="padding: 5px; color: ${nameColor}; ${nameStyle}"><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background-color:${indicatorColor};border:1px solid rgba(255,255,255,0.4);margin-right:8px;vertical-align:middle;flex-shrink:0;"></span>${p.name}</td><td style="padding: 5px; text-align: center; color: #00ff00; font-weight: bold; font-size: 1.1rem;">${p.cardScore}</td><td style="padding: 5px; text-align: center; color: #00ff00; font-weight: bold; font-size: 1.1rem;">${p.totalScore}</td><td style="padding: 5px; text-align: center;">${p.found ? '✅' : '❌'}</td><td style="padding: 5px;"><button style="padding:4px 8px;margin:0;font-size:0.8rem;" onclick="socket.emit('admin:deletePlayer', '${id}')">Supprimer</button></td></tr>`;
            }
            document.getElementById('playerTable').innerHTML = html;
        });
        socket.on('timer', (t) => { document.getElementById('timer').innerText = t; });
    </script>
</body>
</html>
