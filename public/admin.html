<!DOCTYPE html>
<html lang="fr">
<head><style>
    body { background: #1a0b2e; color: #ff4d94; font-family: 'Courier New', monospace; padding: 10px; }
    button { background: #ff4d94; color: white; border: none; padding: 15px; margin: 5px; cursor: pointer; font-weight: bold; }
    button:disabled { background: #555; }
    table { border-collapse: collapse; }
    td:nth-child(2), td:nth-child(3) { color: #00ff00; font-weight: bold; font-size: 1.1rem; text-align: center; }
    th { background: #ff4d94; color: white; padding: 5px; }
    tr:nth-child(even) { background: #2a1a4e; }
    tr:hover { background: #3a2a6e; }
    td { padding: 5px; border-right: 1px solid #ff4d94; }
</style></head>
<body>
    <div id="topAdminBar" style="position:fixed;top:10px;left:10px;right:10px;z-index:1000;display:none;align-items:center;justify-content:space-between;gap:10px;">
        <div id="adminActions" style="display:none;align-items:center;gap:10px;">
            <button id="btnFinish" onclick="if(confirm('Terminer la partie ?')) socket.emit('admin:finishGame')" style="background:#ff6b6b;padding:10px 20px;margin:0;">Terminer la partie</button>
            <button id="btnReset" onclick="if(confirm('Réinitialiser la partie ?')) socket.emit('admin:resetGame')" style="background:#ff6b6b;padding:10px 20px;margin:0;">Réinitialiser la partie</button>
            <button onclick="window.open('/scores?fs=1', '_blank')" style="background:#00b894;padding:10px 20px;margin:0;">Écran scores</button>
        </div>
        <div id="playerLink" style="background:#1a0b2e;border:2px solid #ff4d94;border-radius:8px;padding:8px 10px;display:flex;align-items:stretch;gap:12px;width:920px;max-width:68vw;">
            <div style="display:flex;align-items:center;gap:8px;min-width:120px;">
                <span style="color:#ffffff;font-size:1rem;font-weight:900;letter-spacing:1px;text-shadow:0 0 4px rgba(255,255,255,0.9),0 0 10px rgba(255,255,255,0.8),0 0 18px rgba(255,255,255,0.6);">ZEKATON</span>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px;flex:1;min-width:0;">
                <div style="display:flex;align-items:center;gap:8px;min-width:0;">
                    <span style="color:#aaa;font-size:0.85rem;white-space:nowrap;">🔗 Lien joueurs :</span>
                    <span id="linkText" style="color:#00ff00;font-weight:bold;font-size:0.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;"></span>
                    <button id="copyBtn" onclick="copyLink()" style="padding:5px 12px;font-size:0.8rem;background:#4d94ff;margin:0;">📋 Copier</button>
                </div>
                <div style="display:flex;align-items:center;gap:8px;min-width:0;">
                    <span style="color:#aaa;font-size:0.85rem;white-space:nowrap;">🖥️ Écran scores :</span>
                    <span id="scoreLinkText" style="color:#7dffb3;font-weight:bold;font-size:0.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;"></span>
                    <button id="copyScoreBtn" onclick="copyScoreLink()" style="padding:5px 12px;font-size:0.8rem;background:#00b894;margin:0;">📋 Copier</button>
                </div>
                <div style="display:flex;align-items:center;gap:8px;min-width:0;">
                    <span style="color:#aaa;font-size:0.85rem;white-space:nowrap;">🌐 IP/URL réseau :</span>
                    <input id="networkOriginInput" placeholder="http://192.168.1.21:3000" style="flex:1;min-width:0;background:#120724;border:1px solid #ff4d94;color:#fff;padding:5px 8px;border-radius:6px;font-size:0.8rem;" />
                    <button id="saveNetworkOriginBtn" onclick="saveNetworkOrigin()" style="padding:5px 10px;font-size:0.8rem;background:#4d94ff;margin:0;">Enregistrer</button>
                    <button id="resetNetworkOriginBtn" onclick="resetNetworkOrigin()" style="padding:5px 10px;font-size:0.8rem;background:#6c5ce7;margin:0;">Auto</button>
                </div>
                <div id="networkHint" style="display:none;color:#ffcf66;font-size:0.8rem;line-height:1.3;"></div>
            </div>
        </div>
    </div>
    <div id="setup"><input id="nums" placeholder="20,30,40"><button onclick="setNums()">Enregistrer</button></div>
    <div id="qrScreen" style="display:none;position:fixed;inset:0;background:#0f0820;z-index:900;">
        <div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;">
            <h2 style="color:#ffffff;margin-bottom:10px;">Scannez pour rejoindre ZEKATON</h2>
            <p id="playerUrlLabel" style="color:#ffb3d1;margin-bottom:18px;">Chargement du lien...</p>
            <img id="qrImage" alt="QR Code Zekaton" style="width:min(90vw,90vh);max-width:900px;max-height:72vh;object-fit:contain;border:3px solid #ff4d94;border-radius:16px;background:#fff;padding:12px;" />
        </div>
        <div style="position:absolute;right:16px;bottom:16px;display:flex;gap:10px;">
            <button onclick="backToSetup()" style="background:#4d94ff;padding:10px 16px;margin:0;">← Retour</button>
            <button onclick="goToGameManagement()" style="background:#00b894;padding:10px 16px;margin:0;">Gestion du jeu →</button>
        </div>
    </div>
    <div id="game" style="display:none;">
        <div style="margin: 8px 0;">
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 8px;">
                <button id="btnStartCard" onclick="socket.emit('admin:startCard')" style="flex: 2;">Lancer Nouvelle Carte</button>
                <button onclick="socket.emit('admin:prevCard')" style="background: #4d94ff; flex: 1;">◀ Préc.</button>
                <button onclick="socket.emit('admin:nextCard')" style="background: #4d94ff; flex: 1;">Suiv. ▶</button>
            </div>
        </div>
        <div style="margin: 8px 0;">
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 8px;">
                <button id="btnStartQ" onclick="socket.emit('admin:startQuestion')" style="flex: 2;">Lancer Question</button>
                <button onclick="socket.emit('admin:prevQuestion')" style="background: #4d94ff; flex: 1;">◀ Préc.</button>
                <button id="btnNextQuestion" onclick="socket.emit('admin:nextQuestion')" style="background: #4d94ff; flex: 1;">Suiv. ▶</button>
            </div>
        </div>
        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
            <button id="btnStopQ" onclick="socket.emit('admin:stopQuestion')" style="flex: 1;">Arrêter Question</button>
            <div id="timer" style="font-size: 1.5rem; color: #ff4d94; font-weight: bold; flex: 1; text-align: center;"></div>
            <div id="answersCount" style="font-size: 1.5rem; color: #00ff00; font-weight: bold; flex: 1; text-align: center; border: 1px solid #00ff00; padding: 5px; border-radius: 5px;">0/0</div>
        </div>
        <h2 id="status" style="font-size: 1.2rem; margin-bottom: 10px; color: #ff4d94;">En attente</h2>
        <div id="finalResults" style="display:none; margin: 10px 0; border: 1px solid #ff4d94; border-radius: 8px; padding: 10px; background: #120724;"></div>
        <table border="1" style="width:100%; color:white; margin-top:10px; border-collapse: collapse;">
            <thead><tr style="background: #ff4d94;"><th style="width: 36%; padding: 5px;">Joueur</th><th style="width: 15%; padding: 5px;">Score Carte</th><th style="width: 15%; padding: 5px;">Score Total</th><th style="width: 7%; padding: 5px;">Trouvé</th><th style="width: 10%; padding: 5px;">Action</th></tr></thead><tbody id="playerTable"></tbody>
        </table>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const PUBLIC_ORIGIN = 'https://zekaton.onrender.com';
        const NETWORK_ORIGIN_KEY = 'zekaton_network_origin';
        let customOrigin = localStorage.getItem(NETWORK_ORIGIN_KEY) || '';
        let playerUrl = customOrigin || PUBLIC_ORIGIN;
        let scoreUrl = `${playerUrl}/scores?fs=1`;

        function updateDisplayedUrls() {
            document.getElementById('linkText').innerText = playerUrl;
            document.getElementById('scoreLinkText').innerText = scoreUrl;
            document.getElementById('playerUrlLabel').innerText = playerUrl;
            document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=1200x1200&data=${encodeURIComponent(playerUrl)}`;
            const input = document.getElementById('networkOriginInput');
            if (input && document.activeElement !== input) {
                input.value = customOrigin;
            }
        }

        function normalizeOrigin(value) {
            const trimmed = value.trim();
            if (!trimmed) return '';
            const withProtocol = /^https?:\/\//i.test(trimmed) ? trimmed : `http://${trimmed}`;
            return withProtocol.replace(/\/$/, '');
        }

        function saveNetworkOrigin() {
            const input = document.getElementById('networkOriginInput');
            const normalized = normalizeOrigin(input.value);
            if (!normalized) {
                alert('Entrez une IP/URL valide (ex: 192.168.1.21:3000)');
                return;
            }
            customOrigin = normalized;
            localStorage.setItem(NETWORK_ORIGIN_KEY, customOrigin);
            playerUrl = customOrigin;
            scoreUrl = `${playerUrl}/scores?fs=1`;
            updateDisplayedUrls();
            setCopyFeedback('saveNetworkOriginBtn', '✅ OK');
        }

        function resetNetworkOrigin() {
            customOrigin = '';
            localStorage.removeItem(NETWORK_ORIGIN_KEY);
            loadConnectionInfo();
            setCopyFeedback('resetNetworkOriginBtn', '✅ Auto');
        }

        function setCopyFeedback(buttonId, label) {
            const btn = document.getElementById(buttonId);
            btn.innerText = label;
            setTimeout(() => btn.innerText = '📋 Copier', 2000);
        }

        function copyLink() {
            navigator.clipboard.writeText(playerUrl).then(() => {
                setCopyFeedback('copyBtn', '✅ Copié !');
            });
        }
        function copyScoreLink() {
            navigator.clipboard.writeText(scoreUrl).then(() => {
                setCopyFeedback('copyScoreBtn', '✅ Copié !');
            });
        }
        async function loadConnectionInfo() {
            try {
                const response = await fetch('/api/connection-info');
                if (!response.ok) return;
                const info = await response.json();
                const preferredOrigin = customOrigin || PUBLIC_ORIGIN;

                playerUrl = `${preferredOrigin}${info.playerPath}`;
                scoreUrl = `${preferredOrigin}${info.scoreboardPath}`;
                updateDisplayedUrls();

                const currentHost = window.location.hostname;
                const hint = document.getElementById('networkHint');
                if (currentHost === 'localhost' || currentHost === '127.0.0.1') {
                    hint.style.display = 'block';
                    hint.innerText = info.lanOrigins && info.lanOrigins.length
                        ? `Utilisez ce lien réseau sur le 2e ordinateur : ${preferredOrigin}`
                        : 'Ouvrez l\'admin via l\'adresse IP du PC serveur pour partager les liens sur un autre ordinateur.';
                } else {
                    hint.style.display = 'none';
                }
            } catch (error) {
                updateDisplayedUrls();
            }
        }
        function setNums() { 
            socket.emit('admin:setNumbers', document.getElementById('nums').value.split(',').map(Number)); 
            document.getElementById('setup').style.display='none'; 
            document.getElementById('qrScreen').style.display='block';
            document.getElementById('topAdminBar').style.display='none';
            document.body.style.paddingTop = '10px';
        }
        function backToSetup() {
            document.getElementById('qrScreen').style.display='none';
            document.getElementById('setup').style.display='block';
            document.getElementById('game').style.display='none';
            document.getElementById('topAdminBar').style.display='none';
            document.body.style.paddingTop = '10px';
        }
        function goToGameManagement() {
            document.getElementById('qrScreen').style.display='none';
            document.getElementById('setup').style.display='none';
            document.getElementById('game').style.display='block';
            document.getElementById('topAdminBar').style.display='flex';
            document.getElementById('adminActions').style.display='flex';
            document.body.style.paddingTop = '78px';
        }
        updateDisplayedUrls();
        loadConnectionInfo();
        socket.on('update', (data) => {
            const questionLabel = data.currentQuestionIndex >= 4 ? 'Fin de la carte' : `Question: ${data.currentQuestionIndex + 1}`;
            document.getElementById('status').innerText = `Carte: ${data.currentCardIndex + 1} | ${questionLabel} | État: ${data.gameState}`;
            document.getElementById('timer').innerText = data.timeLeft;
            const finalResults = document.getElementById('finalResults');
            const playersTable = document.getElementById('playerTable').closest('table');
            
            // Désactiver le bouton si la limite est atteinte ou si l'état n'est pas correct
            document.getElementById('btnStartQ').disabled = !((data.gameState === 'WAITING_FOR_QUESTION' || data.gameState === 'FEEDBACK') && data.currentQuestionIndex < 4);
            
            // Changer le label du bouton "Avancer Question" si on est à la Q4
            const btnNextQuestion = document.getElementById('btnNextQuestion');
            if(data.currentQuestionIndex === 3) {
                btnNextQuestion.innerText = '🔄 Carte';
            } else {
                btnNextQuestion.innerText = 'Suiv. ▶';
            }
            
            const registeredPlayers = Object.keys(data.players).length;
            document.getElementById('answersCount').innerText = `Joueurs: ${registeredPlayers}`;

            if (data.gameState === 'GAME_FINISHED') {
                const ranking = Object.values(data.players).sort((a, b) => b.totalScore - a.totalScore);
                const top3 = ranking.slice(0, 3);
                const medals = ['🥇', '🥈', '🥉'];

                const podiumHtml = top3.length
                    ? top3.map((p, i) => `<div style="flex:1;min-width:140px;border:1px solid #ff4d94;border-radius:8px;padding:8px;text-align:center;background:#1b0d35;"><div style="font-size:1.6rem;">${medals[i]}</div><div style="color:#fff;font-weight:bold;">${p.name}</div><div style="color:#00ff00;font-size:1.2rem;">${p.totalScore} pts</div></div>`).join('')
                    : '<p style="color:#fff;">Aucun joueur classé.</p>';

                const rankingHtml = ranking.length
                    ? ranking.map((p, i) => `<div style="display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid #3a2a6e;"><span style="color:#fff;">#${i + 1} ${p.name}</span><span style="color:#00ff00;font-weight:bold;">${p.totalScore} pts</span></div>`).join('')
                    : '<p style="color:#fff;">Aucun score.</p>';

                finalResults.innerHTML = `
                    <h3 style="margin:0 0 10px 0; color:#ff4d94;">🏁 Fin de partie</h3>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">${podiumHtml}</div>
                    <h4 style="margin:0 0 6px 0; color:#ff4d94;">Classement complet</h4>
                    <div>${rankingHtml}</div>
                `;
                finalResults.style.display = 'block';
                playersTable.style.display = 'none';
                return;
            }

            finalResults.style.display = 'none';
            playersTable.style.display = 'table';

            let html = '';
            for(let id in data.players) {
                const p = data.players[id];
                const nameColor = p.left ? '#ff6b6b' : '#ff4d94';
                const nameStyle = p.left ? 'text-decoration: line-through;' : '';
                // En FEEDBACK, currentQuestionIndex a déjà été incrémenté côté serveur, on compare donc sans +1
                const checkQ = (data.gameState === 'FEEDBACK') ? data.currentQuestionIndex : data.currentQuestionIndex + 1;
                const hasAnswered = Array.isArray(p.history) && p.history.some(h => h.question === checkQ);
                const isActive = data.gameState === 'GUESSING' || data.gameState === 'FEEDBACK';
                const indicatorColor = p.found ? '#00ff00' : (!isActive ? '#888888' : (hasAnswered ? '#00ff00' : '#ff2222'));
                html += `<tr style="border-bottom: 1px solid #ff4d94;"><td style="padding: 5px; color: ${nameColor}; ${nameStyle}"><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background-color:${indicatorColor};border:1px solid rgba(255,255,255,0.4);margin-right:8px;vertical-align:middle;flex-shrink:0;"></span>${p.name}</td><td style="padding: 5px; text-align: center; color: #00ff00; font-weight: bold; font-size: 1.1rem;">${p.cardScore}</td><td style="padding: 5px; text-align: center; color: #00ff00; font-weight: bold; font-size: 1.1rem;">${p.totalScore}</td><td style="padding: 5px; text-align: center;">${p.found ? '✅' : '❌'}</td><td style="padding: 5px; text-align: center;"><button style="padding:4px 8px;margin:0;font-size:0.8rem;" onclick="socket.emit('admin:deletePlayer', '${id}')">Supprimer</button></td></tr>`;
            }
            document.getElementById('playerTable').innerHTML = html;
        });
        socket.on('timer', (t) => { document.getElementById('timer').innerText = t; });
    </script>
</body>
</html>
