<!DOCTYPE html>
<html lang="fr">
<head><style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
        background: #0f0f2d; 
        color: #fff; 
        font-family: sans-serif; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding: 20px;
        min-height: 100vh;
        font-size: 32px;
    }
    .card { 
        border: 2px solid #ff4d94; 
        padding: 25px; 
        border-radius: 20px; 
        width: 100%; 
        max-width: 750px; 
        text-align: center;
        margin-bottom: 80px;
        flex-grow: 1;
        overflow-y: auto;
        max-height: calc(100vh - 120px);
    }
    h1 { font-size: 5rem; margin-bottom: 20px; }
    h2 { font-size: 3.6rem; margin-bottom: 15px; color: #ff4d94; }
    h3 { font-size: 2.6rem; margin: 15px 0; }
    p { font-size: 2.2rem; margin: 10px 0; line-height: 1.5; }
    input { 
        font-size: 2rem; 
        padding: 12px; 
        margin: 10px 0; 
        width: 100%; 
        border: 2px solid #ff4d94; 
        border-radius: 8px; 
        background: #1a0b2e; 
        color: #fff;
    }
    button { 
        font-size: 2rem; 
        padding: 12px 20px; 
        margin: 10px 5px; 
        background: #ff4d94; 
        color: white; 
        border: none; 
        border-radius: 8px; 
        cursor: pointer; 
        font-weight: bold;
        width: 100%;
    }
    button:active { background: #ff2d74; }
    #timer { font-size: 6rem; color: #ff4d94; font-weight: bold; margin: 20px 0; }
    #history { margin-top: 20px; }
    #history > div { margin: 8px 0; padding: 8px; background: #1a0b2e; border-left: 3px solid #ff4d94; }
    .leave-btn {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        background: #ff6b6b;
        padding: 15px;
        border: none;
        font-size: 2.2rem;
        font-weight: bold;
        cursor: pointer;
        z-index: 1000;
        margin: 0;
        border-radius: 0;
    }
    .leave-btn:active { background: #ff4545; }
    
    @media (max-width: 600px) {
        body { padding: 15px; font-size: 28px; }
        .card { 
            padding: 20px; 
            margin-bottom: 80px;
            max-height: calc(100vh - 100px);
        }
        h1 { font-size: 3.6rem; margin-bottom: 15px; }
        h2 { font-size: 2.8rem; }
        h3 { font-size: 2.2rem; }
        p { font-size: 2rem; }
        input { font-size: 2rem; padding: 10px; }
        button { font-size: 1.9rem; padding: 10px 15px; }
        #timer { font-size: 5rem; }
    }
    
    @media (max-width: 400px) {
        h1 { font-size: 3.2rem; }
        h2 { font-size: 2.4rem; }
        p { font-size: 1.9rem; }
        button { font-size: 1.8rem; padding: 10px; }
        .leave-btn { font-size: 2rem; padding: 12px; }
    }
</style></head>
<body>
    <div id="app" class="card">
        <h1>ZEKATON</h1>
        <div id="content">
            <p>Zekaton, un jeu de questions fun où tout le monde peut gagner. Principe du jeu : sur chaque carte, 4 questions où il faut deviner un nombre entre 0 & 100.</p>
            <input id="name" placeholder="Votre Nom"><button onclick="join()">S'inscrire</button>
        </div>
    </div>
    <button id="leaveBtn" class="leave-btn" onclick="leaveGame()" style="display: none;">Partir</button>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myId = '';
        function join() { 
            const name = document.getElementById('name').value;
            if(!name) return;
            socket.emit('join', name); 
            document.getElementById('content').innerHTML = '<h2>En attente...</h2>'; 
        }
        function leaveGame() {
            if(confirm('Êtes-vous sûr de vouloir partir du jeu ?')) {
                socket.emit('player:leave');
                document.getElementById('app').innerHTML = '<h1>ZEKATON</h1><h2>Vous avez quitté le jeu</h2><p>Merci d\'avoir participé !</p>';
                document.getElementById('leaveBtn').style.display = 'none';
            }
        }
        function submitGuess() {
            const guessInput = document.getElementById('guess');
            if(!guessInput) return;
            
            const guess = parseInt(guessInput.value);
            
            // Validation
            if(!guessInput.value || isNaN(guess) || guess < 0 || guess > 100) {
                alert('Veuillez entrer un nombre entre 0 et 100');
                return;
            }
            
            // Désactiver le bouton pour éviter les doubles clics
            const btn = document.getElementById('btn');
            if(btn) btn.disabled = true;
            
            // Envoyer la réponse
            socket.emit('guess', guess);
            guessInput.value = '';
        }
        function attachQuestionEvents() {
            const guessInput = document.getElementById('guess');
            const btn = document.getElementById('btn');
            
            if(guessInput) {
                guessInput.addEventListener('keypress', function(e) {
                    if(e.key === 'Enter') {
                        submitGuess();
                    }
                });
                guessInput.focus();
            }
            
            if(btn) {
                btn.addEventListener('click', submitGuess);
            }
        }
        function showLeaveBtn() {
            document.getElementById('leaveBtn').style.display = 'block';
        }
        function hideLeaveBtn() {
            document.getElementById('leaveBtn').style.display = 'none';
        }
        socket.on('connect', () => { myId = socket.id; });
        
        socket.on('update', (data) => {
            if(!data.players[myId]) return;
            const p = data.players[myId];
            const app = document.getElementById('app');
            
            if(p.left) {
                app.innerHTML = `<h1>ZEKATON</h1><h2>Vous avez quitté le jeu</h2><p>Merci d'avoir participé !</p>`;
                hideLeaveBtn();
                return;
            }
            
            if(data.gameState === 'GUESSING') {
                app.innerHTML = `
                    <h1>Carte ${data.currentCardIndex + 1} - Q${data.currentQuestionIndex + 1}</h1>
                    <div id="timer">${data.timeLeft}</div>
                    ${p.history.some(h => h.question === data.currentQuestionIndex + 1) 
                        ? `<p>Réponse envoyée. Attente de la fin du chrono...</p>` 
                        : `<input id="guess" type="number" placeholder="Nombre (0-100)" min="0" max="100" onkeypress="if(event.key==='Enter') submitGuess()">
                           <button id="btn" onclick="submitGuess()">Valider</button>`
                    }
                    <div id="history"><h3>Historique</h3>${p.history.map(h=>`<div>Q${h.question}: ${h.guess} -> ${h.feedback}</div>`).join('')}</div>
                `;
                showLeaveBtn();
            } else if(data.gameState === 'CARD_FINISHED') {
                const scoresHtml = Object.values(data.players)
                    .sort((a, b) => b.cardScore - a.cardScore)
                    .map(player => `<div style="margin: 10px; padding: 10px; border: 1px solid #ff4d94; border-radius: 10px;">
                        <strong>${player.name}</strong>: <span style="font-size: 1.3rem; color: #00ff00;">${player.cardScore}</span> points
                    </div>`)
                    .join('');
                app.innerHTML = `
                    <h1>Carte ${data.currentCardIndex + 1} - Terminée !</h1>
                    <h2>Scores de la carte :</h2>
                    ${scoresHtml}
                    <p style="margin-top: 20px; color: #999;">Attente de l'administrateur...</p>
                `;
                showLeaveBtn();
            } else if(data.gameState === 'GAME_FINISHED') {
                const allPlayers = Object.values(data.players).sort((a, b) => b.totalScore - a.totalScore);
                const myPosition = allPlayers.findIndex(player => player.name === p.name) + 1;
                const totalPlayers = allPlayers.length;
                
                let congratMessage = '';
                if(myPosition === 1) {
                    congratMessage = '🏆 FÉLICITATIONS ! VOUS ÊTES LE CHAMPION ! 🏆';
                } else if(myPosition === 2) {
                    congratMessage = '🥈 Excellente performance ! Vous êtes 2e !';
                } else if(myPosition === 3) {
                    congratMessage = '🥉 Bravo ! Vous êtes 3e !';
                } else {
                    congratMessage = '👏 Merci d\'avoir joué !';
                }
                
                const classementHtml = allPlayers
                    .map((player, idx) => `<div style="margin: 10px; padding: 10px; border: 1px solid #ff4d94; border-radius: 10px;">
                        <strong>#${idx + 1} ${player.name}</strong>: <span style="font-size: 1.3rem; color: #00ff00;">${player.totalScore}</span> points
                    </div>`)
                    .join('');
                
                app.innerHTML = `
                    <h1>🎮 JEU TERMINÉ 🎮</h1>
                    <h2 style="color: #00ff00; margin: 20px 0;">${congratMessage}</h2>
                    <p style="font-size: 1.1rem; margin: 15px 0;">Votre position : <strong>#${myPosition}/${totalPlayers}</strong></p>
                    <p style="font-size: 1.1rem; margin: 10px 0;">Votre score final : <strong style="color: #00ff00;">${p.totalScore}</strong> points</p>
                    <h3 style="margin-top: 20px;">🏅 Classement Final :</h3>
                    ${classementHtml}
                `;
                showLeaveBtn();
            } else if(data.gameState === 'FEEDBACK') {
                const lastHistory = p.history[p.history.length - 1];
                app.innerHTML = `
                    <h1>Résultats</h1>
                    <p>Votre score à cette carte : <strong style="color: #00ff00;">${p.cardScore}</strong> points</p>
                    <p>Score total : <strong style="color: #00ff00;">${p.totalScore}</strong> points</p>
                    ${lastHistory ? `<p>Dernière réponse : ${lastHistory.guess} - ${lastHistory.feedback}</p>` : ''}
                    <p>Attente du prochain tour...</p>
                `;
                showLeaveBtn();
            } else {
                const questionNum = Math.min(data.currentQuestionIndex + 1, 4);
                app.innerHTML = `
                    <h1>En attente...</h1>
                    <p>Zekaton, un jeu de questions fun où tout le monde peut gagner. Principe du jeu : sur chaque carte, 4 questions où il faut deviner un nombre entre 0 & 100.</p>
                    <p>Carte ${data.currentCardIndex + 1} - Question ${questionNum} à venir</p>
                `;
                showLeaveBtn();
            }
        });
        socket.on('timer', (t) => { 
            const timerEl = document.getElementById('timer');
            if(timerEl) timerEl.innerText = t; 
            if(t<=0) {
                const btn = document.getElementById('btn');
                if(btn) btn.disabled = true;
            }
        });
        socket.on('feedback', (msg) => { 
            const app = document.getElementById('app');
            app.innerHTML += `<div id="feedback" style="margin-top:10px; font-weight:bold;">${msg}</div>`;
        });
    </script>
</body>
</html>
